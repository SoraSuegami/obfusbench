<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.site_description }}">
    <title>{% block title %}{{ site.site_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ base_url }}static/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1><a href="{{ base_url }}">{{ site.site_name }}</a></h1>
            <p class="tagline">{{ site.site_tagline }}</p>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="container">
            <p>{{ site.site_name }} &mdash; <a href="{{ site.repository_url }}">Source on GitHub</a></p>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
